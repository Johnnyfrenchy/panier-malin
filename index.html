    const similarity = (a,b) => { const wa=new Set(normalize(a).split(/\s+/).filter(w=>w.length>2)); const wb=new Set(normalize(b).split(/\s+/).filter(w=>w.length>2)); const inter=[...wa].filter(w=>wb.has(w)).length; const union=new Set([...wa,...wb]).size; return union>0?inter/union:0; };

    const App = () => {

        const mTotal    = useMemo(() => receipts.filter(r => { const d=new Date(r.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); }).reduce((s,r) => s+(r.total||0), 0), [receipts]);
        const pmTotal   = useMemo(() => { const pm=new Date(now.getFullYear(),now.getMonth()-1,1); return receipts.filter(r => { const d=new Date(r.date); return d.getMonth()===pm.getMonth()&&d.getFullYear()===pm.getFullYear(); }).reduce((s,r) => s+(r.total||0), 0); }, [receipts]);
        const mDelta    = pmTotal > 0 ? ((mTotal-pmTotal)/pmTotal*100).toFixed(0) : null;
        const mCount    = useMemo(() => receipts.filter(r => { const d=new Date(r.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); }).length, [receipts]);
        const filtered  = useMemo(() => products.filter(p => p.name.toLowerCase().includes(search.toLowerCase())).sort((a,b) => a.name.localeCompare(b.name)), [products, search]);
        const changed   = useMemo(() => products.filter(p => p.lastPrice && p.lastPrice!==p.currentPrice).sort((a,b) => Math.abs(parseFloat(calcDelta(b.currentPrice,b.lastPrice)||0)) - Math.abs(parseFloat(calcDelta(a.currentPrice,a.lastPrice)||0))), [products]);
        const priceAlerts = useMemo(() => products.filter(p => { const d=calcDelta(p.currentPrice,p.lastPrice); return d&&parseFloat(d)>=5; }).sort((a,b)=>parseFloat(calcDelta(b.currentPrice,b.lastPrice)||0)-parseFloat(calcDelta(a.currentPrice,a.lastPrice)||0)), [products]);
        const last6Months = useMemo(() => {
            const months = [];
            for (let i=5; i>=0; i--) {
                const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
                const total = receipts.filter(r => { const rd=new Date(r.date); return rd.getMonth()===d.getMonth()&&rd.getFullYear()===d.getFullYear(); }).reduce((s,r)=>s+(r.total||0),0);
                months.push({ label: d.toLocaleString('fr-FR',{month:'short'}), month: d.getMonth(), year: d.getFullYear(), total, isCurrent: i===0 });
            }
            return months;
        }, [receipts]);
        const shopByStore = useMemo(() => { const g={}; shopList.forEach(p=>{ const k=p.store||''; if(!g[k])g[k]=[]; g[k].push(p); }); return Object.entries(g).sort(([a],[b])=>a===''?1:b===''?-1:a.localeCompare(b)); }, [shopList]);
        const shopByStoreFiltered = useMemo(() => { if (!listSearch.trim()) return shopByStore; const q=listSearch.toLowerCase(); return shopByStore.map(([s,items])=>[s,items.filter(i=>i.name.toLowerCase().includes(q))]).filter(([,items])=>items.length>0); }, [shopByStore, listSearch]);
        const topProducts = useMemo(() => [...products].filter(p=>!p.oneshot).sort((a,b)=>(b.priceHistory||[]).length-(a.priceHistory||[]).length).slice(0,8), [products]);
        const filteredCat = useMemo(() => { let r=products.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())); if(activeCat) r=r.filter(p=>p.category===activeCat); return r.sort((a,b)=>a.name.localeCompare(b.name)); }, [products,search,activeCat]);

        if (loading) return (
            <div style={{height:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12}}>
                <div style={{width:32, height:32, border:'2px solid #e4e4e8', borderTopColor:'#3b6ef5', borderRadius:'50%', animation:'spin .7s linear infinite'}}></div>

            </div>
        );

        if (!user) return (
            <div style={{height:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'32px 24px', gap:28, background:'var(--bg)'}}>

                    <svg xmlns="http://www.w3.org/2000/svg" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                </div>
                <div style={{textAlign:'center'}}>
                    <div style={{fontSize:30, fontWeight:800, letterSpacing:'-.03em', color:'var(--tx)'}}>Panier Malin</div>
                    <div style={{color:'var(--mu)', marginTop:6, fontSize:15}}>Gérez vos courses intelligemment</div>
                </div>
                <button onClick={() => window.firebase.signInWithPopup(window.firebase.auth, window.firebase.googleProvider).catch(e => alert('Connexion impossible : ' + e.message))} style={{background:'#fff', border:'1.5px solid var(--bd)', borderRadius:14, padding:'13px 22px', display:'flex', alignItems:'center', gap:10, cursor:'pointer', fontWeight:600, fontSize:15, color:'var(--tx)', boxShadow:'var(--sh)', width:'100%', maxWidth:320, justifyContent:'center'}}>
                    <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Continuer avec Google
                </button>
            </div>
        );

        return (
            <div style={{paddingBottom:76, minHeight:'100vh'}}>
                <button onClick={signOut} tabIndex={-1} style={{position:'fixed', top:12, right:12, zIndex:200, background:'var(--sf)', border:'1px solid var(--bd)', borderRadius:10, padding:'6px 12px', fontFamily:'Figtree,sans-serif', fontSize:12, fontWeight:600, color:'var(--mu)', cursor:'pointer', boxShadow:'var(--sh)'}} title="Se déconnecter">Déconnexion</button>

                {view==='accueil' && (
                    <div style={{padding:'20px 16px', display:'flex', flexDirection:'column', gap:14}}>
                        <div className="hero fu">
                            <div style={{fontSize:11, fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase', opacity:.75, marginBottom:6}}>{now.toLocaleString('fr-FR',{month:'long',year:'numeric'})}</div>
                            <div className="ha">{fmt(mTotal)} €{monthlyBudget>0 && <span style={{fontSize:16, fontWeight:500, opacity:.7}}> / {fmt(monthlyBudget)} €</span>}</div>

                                <div style={{marginTop:10, background:'rgba(255,255,255,.2)', borderRadius:6, height:6, overflow:'hidden'}}>

                                </div>

                            </button>
                            <button className="qa" onClick={() => setView('liste')}>

                                </div>
                            </div>

                            <div className="st" style={{marginTop:4}}>Compte</div>

                                <div style={{flex:1, minWidth:0}}>
                                    <div style={{fontWeight:600, fontSize:14, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{user.displayName || user.email}</div>
                                    <div style={{fontSize:12, color:'var(--mu)', marginTop:2}}>{user.email}</div>
                                </div>
                                <button className="bs" style={{fontSize:12, padding:'7px 12px', flexShrink:0}} onClick={() => window.firebase.signOut(window.firebase.auth)}>Déconnexion</button>
                            </div>
                        </div>
                    </div>
                )}

                {view==='catalogue' && (
                    <div className="fu" style={{padding:'20px 16px', display:'flex', flexDirection:'column', gap:12}}>
                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                            <span className="pt">Catalogue</span>
                            <span className="chip">{products.length} produits</span>
                        </div>
                        {cleanPreview && (
                            <div className="card fu" style={{overflow:'hidden', border:'1.5px solid var(--ac)'}}>
                                <div style={{padding:'12px 16px', borderBottom:'1px solid var(--bdl)', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                                    <span style={{fontWeight:700, fontSize:14}}>✨ {cleanPreview.length} noms à corriger</span>
                                    <button className="db" onClick={()=>setCleanPreview(null)}><Ico n="x" s={16}/></button>
                                </div>
                                <div style={{maxHeight:240, overflowY:'auto'}}>
                                    {cleanPreview.map((p,i) => (
                                        <div key={p.id} style={{padding:'8px 16px', borderBottom:'1px solid var(--bdl)', display:'flex', flexDirection:'column', gap:2}}>
                                            <span style={{fontSize:11, color:'var(--mu)', textDecoration:'line-through'}}>{p.oldName}</span>
                                            <input value={p.newName} onChange={e=>{const c=[...cleanPreview];c[i]={...c[i],newName:e.target.value};setCleanPreview(c);}} style={{fontSize:13,fontWeight:600,color:'var(--dn)',background:'none',border:'none',outline:'none',fontFamily:'Figtree,sans-serif'}}/>
                                        </div>
                                    ))}
                                </div>
                                <div style={{padding:12, display:'flex', gap:8, borderTop:'1px solid var(--bdl)'}}>
                                    <button className="bs" style={{flex:1}} onClick={()=>setCleanPreview(null)}>Annuler</button>
                                    <button className="bp" style={{flex:2}} onClick={async()=>{ for(const p of cleanPreview) await window.firebase.updateDoc(window.firebase.doc(window.firebase.db,'artifacts',APP_ID,'users',user.uid,'products',p.id),{name:p.newName}); setCleanPreview(null); }}>Appliquer</button>
                                </div>
                            </div>
                        )}
                        <div className="card" style={{padding:14, display:'flex', flexDirection:'column', gap:10}}>
                            <input className="inp" placeholder="Nom du produit" value={newItem.name} onChange={e => setNewItem({...newItem, name:e.target.value})}
                                onKeyDown={e => { if (e.key==='Enter'&&newItem.name&&newItem.price) { save({name:newItem.name, currentPrice:parseFloat(newItem.price), lastPrice:parseFloat(newItem.price), isNeeded:false, quantity:1, priceHistory:[], store:newItem.store}); setNewItem({name:'',price:'',store:''}); } }}
                            />
                            <div style={{display:'flex', gap:8}}>
                                <input className="inp" type="number" step="0.01" placeholder="Prix €" value={newItem.price} onChange={e => setNewItem({...newItem, price:e.target.value})} style={{flex:1}}/>
                                <div style={{display:'flex', alignItems:'center', gap:6, flex:1, background:'var(--sf2)', borderRadius:12, padding:'0 10px', border:'1.5px solid transparent'}}>
                                    <StoreBadge store={newItem.store}/>
                                    <input className="inp" placeholder="Magasin" value={newItem.store} onChange={e => setNewItem({...newItem, store:e.target.value})} list="stores-datalist" style={{background:'none', border:'none', borderRadius:0, padding:'10px 0', fontSize:13, flex:1}}/>
                                </div>

                            <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
                                {CATS.map(c => <button key={c} onClick={()=>setNewItem({...newItem,category:c})} style={{fontSize:11, fontWeight:600, padding:'4px 10px', borderRadius:20, border:'1.5px solid', borderColor:newItem.category===c?'var(--ac)':'var(--bd)', background:newItem.category===c?'var(--acl)':'transparent', color:newItem.category===c?'var(--ac)':'var(--mu)', cursor:'pointer'}}>{c}</button>)}
                            </div>
                            <input className="inp" placeholder="Note ou variante (optionnel)…" value={newItem.note||''} onChange={e=>setNewItem({...newItem,note:e.target.value})} style={{fontSize:13}}/>
                            <button className="bp" onClick={() => { if (!newItem.name||!newItem.price) return; save({name:newItem.name, currentPrice:parseFloat(newItem.price), lastPrice:parseFloat(newItem.price), isNeeded:false, quantity:1, priceHistory:[], store:newItem.store, category:newItem.category||'', note:newItem.note||''}); setNewItem({name:'',price:'',store:'',category:'',note:''}); }}>Ajouter</button>
                            <datalist id="stores-datalist">
                                {['Carrefour','Leclerc','Lidl','Aldi','Intermarché','Casino','Monoprix','Franprix','Super U','Picard','Biocoop','Grand Frais'].map(s => <option key={s} value={s}/>)}
                            </datalist>
                        </div>
                        <div style={{display:'flex', gap:8}}>
                            <input className="inp" placeholder="Rechercher…" value={search} onChange={e => setSearch(e.target.value)} style={{flex:1}}/>
                            <button className="bs" style={{fontSize:12, padding:'10px 14px', display:'flex', alignItems:'center', gap:5, flexShrink:0, whiteSpace:'nowrap'}} onClick={cleanNames} disabled={cleaning}>

                                {CATS.filter(c=>products.some(p=>p.category===c)).map(c=><button key={c} onClick={()=>setActiveCat(activeCat===c?'':c)} style={{fontSize:11, fontWeight:600, padding:'4px 10px', borderRadius:20, border:'1.5px solid', borderColor:activeCat===c?'var(--ac)':'var(--bd)', background:activeCat===c?'var(--acl)':'transparent', color:activeCat===c?'var(--ac)':'var(--mu)', cursor:'pointer'}}>{c}</button>)}
                            </div>

                                <div key={cat}>
                                    <div className="st" style={{padding:'8px 4px 2px', marginBottom:0}}>{cat}</div>
                                    <div className="card" style={{overflow:'hidden'}}>
                                        {filteredCat.filter(p=>p.category===cat).map(p => {

                                        {filteredCat.filter(p=>!p.category).map(p => {
                                            const d=calcDelta(p.currentPrice,p.lastPrice); const up=d&&parseFloat(d)>0; const isExp=expandedId===p.id; const hist=p.priceHistory||[];
                                            return (<div key={p.id}><div className="row" style={{flexWrap:'wrap'}}><button className={"chk "+(p.isNeeded?'on':'')} onClick={()=>upd(p.id,{isNeeded:!p.isNeeded})}>{p.isNeeded&&<Ico n="chk" s={13} c="white"/>}</button>{p.store&&<StoreBadge store={p.store}/>}<span style={{flex:1,fontSize:14,fontWeight:500,color:p.isNeeded?'var(--tx)':'var(--tx2)',cursor:'pointer',paddingLeft:p.store?6:0}} onClick={()=>setExpandedId(isExp?null:p.id)}>{p.name}</span>{p.category&&<span style={{fontSize:10,fontWeight:600,color:'var(--mu)',background:'var(--sf2)',borderRadius:10,padding:'2px 7px'}}>{p.category}</span>}{d&&<span className={"vb "+(up?'vup':'vdn')}>{up?'+':''}{d}%</span>}<input type="number" step="0.01" className="pi" defaultValue={p.currentPrice?.toFixed(2)} key={p.id+'-'+p.currentPrice} onBlur={e=>{const v=parseFloat(e.target.value);if(!isNaN(v)&&v!==p.currentPrice)upd(p.id,{lastPrice:p.currentPrice,currentPrice:v,priceHistory:[...hist,{price:p.currentPrice,date:new Date().toISOString()}]});}}/><button className="db" onClick={()=>{if(confirm('Supprimer ?'))del(p.id);}}><Ico n="trash" s={15}/></button></div>{isExp&&(<div style={{padding:'8px 16px 12px',borderTop:'1px solid var(--bdl)',background:'var(--sf2)',display:'flex',flexDirection:'column',gap:8}}>{hist.length>0&&(<div style={{display:'flex',alignItems:'center',gap:16}}><Sparkline data={[...hist,{price:p.currentPrice,date:new Date().toISOString()}]} w={90} h={28}/><div style={{display:'flex',flexDirection:'column',gap:2,flex:1}}>{[...hist].reverse().slice(0,3).map((h,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--mu)'}}><span>{new Date(h.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span><span style={{fontFamily:'DM Mono'}}>{fmt(h.price)} €</span></div>))}</div></div>)}<input className="inp" placeholder="Note ou variante…" defaultValue={p.note||''} onBlur={e=>{if(e.target.value!==(p.note||''))upd(p.id,{note:e.target.value});}} style={{fontSize:12,padding:'6px 10px'}}/></div>)}</div>);
                                        })}
                                    </div>
                                </div>
                            )}
                            {(activeCat || search) && filteredCat.map(p => {
                                const d = calcDelta(p.currentPrice, p.lastPrice);
                                const up = d && parseFloat(d) > 0;
                                const isExp = expandedId === p.id;
                                const hist = p.priceHistory||[];
                                return (
                                    <div key={p.id}>
                                        <div className="row" style={{flexWrap:'wrap'}}>
                                            <button className={"chk "+(p.isNeeded?'on':'')} onClick={() => upd(p.id, {isNeeded:!p.isNeeded})}>{p.isNeeded && <Ico n="chk" s={13} c="white"/>}</button>
                                            {p.store && <StoreBadge store={p.store}/>}
                                            <span style={{flex:1, fontSize:14, fontWeight:500, color:p.isNeeded?'var(--tx)':'var(--tx2)', cursor:'pointer', paddingLeft:p.store?6:0}} onClick={()=>setExpandedId(isExp?null:p.id)}>{p.name}</span>
                                            {p.category && <span style={{fontSize:10, fontWeight:600, color:'var(--mu)', background:'var(--sf2)', borderRadius:10, padding:'2px 7px'}}>{p.category}</span>}
                                            {d && <span className={"vb "+(up?'vup':'vdn')}>{up?'+':''}{d}%</span>}
                                            <input type="number" step="0.01" className="pi" defaultValue={p.currentPrice?.toFixed(2)} key={p.id+'-'+p.currentPrice}
                                                onBlur={e => { const v=parseFloat(e.target.value); if (!isNaN(v)&&v!==p.currentPrice) upd(p.id, {lastPrice:p.currentPrice, currentPrice:v, priceHistory:[...hist,{price:p.currentPrice,date:new Date().toISOString()}]}); }}
                                            />
                                            <button className="db" onClick={() => { if (confirm('Supprimer ?')) del(p.id); }}><Ico n="trash" s={15}/></button>
                                        </div>
                                        {isExp && (
                                            <div style={{padding:'8px 16px 12px', borderTop:'1px solid var(--bdl)', background:'var(--sf2)', display:'flex', flexDirection:'column', gap:8}}>
                                                {hist.length>0 && (
                                                    <div style={{display:'flex', alignItems:'center', gap:16}}>
                                                        <Sparkline data={[...hist,{price:p.currentPrice,date:new Date().toISOString()}]} w={90} h={28}/>
                                                        <div style={{display:'flex', flexDirection:'column', gap:2, flex:1}}>
                                                            {[...hist].reverse().slice(0,3).map((h,i)=>(
                                                                <div key={i} style={{display:'flex', justifyContent:'space-between', fontSize:11, color:'var(--mu)'}}>
                                                                    <span>{new Date(h.date).toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</span>
                                                                    <span style={{fontFamily:'DM Mono'}}>{fmt(h.price)} €</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                                <input className="inp" placeholder="Note ou variante…" defaultValue={p.note||''} onBlur={e=>{if(e.target.value!==(p.note||''))upd(p.id,{note:e.target.value});}} style={{fontSize:12,padding:'6px 10px'}}/>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                )}

                {view==='liste' && (
                    <div className="fu" style={{padding:'20px 16px', display:'flex', flexDirection:'column', gap:12}}>
                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                            <span className="pt">Ma liste</span>
                            <span style={{fontFamily:'DM Mono', fontSize:13, color:'var(--mu)'}}>{shopList.length} articles</span>
                        </div>
                        <div className="card" style={{padding:'16px 18px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                            <div>
                                <div style={{fontSize:11, fontWeight:700, letterSpacing:'.06em', textTransform:'uppercase', color:'var(--mu)', marginBottom:4}}>Estimation</div>
                                <div style={{fontFamily:'DM Mono', fontSize:28, fontWeight:500, color:'var(--ac)', letterSpacing:'-.02em'}}>{fmt(shopTotal)} €</div>
                            </div>
                            {shopList.length>0 && (
                                <button className="bp" style={{fontSize:13, padding:'10px 16px'}} onClick={async () => {
                                    await addRec({date:new Date().toISOString(), total:shopTotal, itemCount:shopList.length});
                                    for (const it of shopList) upd(it.id, {isNeeded:false, quantity:1});
                                    setView('accueil');
                                }}>Terminer</button>
                            )}
                        </div>
                        <div style={{display:'flex', gap:8}}>
                            <input className="inp" placeholder="Ajouter un article rapide…" value={quickItem} onChange={e=>setQuickItem(e.target.value)}
                                onKeyDown={e=>{ if(e.key==='Enter'&&quickItem.trim()){ save({name:quickItem.trim(),currentPrice:0,lastPrice:0,isNeeded:true,quantity:1,priceHistory:[],oneshot:true}); setQuickItem(''); } }}
                                style={{flex:1}}
                            />
                            <button className="bp" style={{padding:'10px 16px', fontSize:20, lineHeight:1}} onClick={()=>{ if(!quickItem.trim()) return; save({name:quickItem.trim(),currentPrice:0,lastPrice:0,isNeeded:true,quantity:1,priceHistory:[],oneshot:true}); setQuickItem(''); }}>+</button>
                        </div>
                        {shopList.length>0 && <input className="inp" placeholder="Rechercher dans la liste…" value={listSearch} onChange={e=>setListSearch(e.target.value)} style={{fontSize:13}}/>}
                        {topProducts.filter(p=>!p.isNeeded).length>0 && shopList.length===0 && (
                            <div>
                                <div className="st">Les + achetés</div>
                                <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
                                    {topProducts.filter(p=>!p.isNeeded).map(p=>(
                                        <button key={p.id} onClick={()=>upd(p.id,{isNeeded:true,quantity:1})} style={{display:'flex',alignItems:'center',gap:6,background:'#fff',border:'1.5px solid var(--bdl)',borderRadius:20,padding:'6px 12px',fontSize:13,fontWeight:500,cursor:'pointer',boxShadow:'var(--sh)'}}>
                                            {p.store && <StoreBadge store={p.store}/>}
                                            <span>{p.name}</span>
                                            {p.currentPrice>0 && <span style={{fontFamily:'DM Mono',fontSize:11,color:'var(--mu)'}}>{fmt(p.currentPrice)}€</span>}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                        {shopList.length===0 && topProducts.filter(p=>!p.isNeeded).length===0 && <div className="card"><div className="em"><div className="ei"><Ico n="list" s={24} c="var(--bd)"/></div>Coche des produits dans le catalogue<br/><span style={{fontSize:12}}>ou ajoute un article rapide ci-dessus</span></div></div>}
                        {shopByStoreFiltered.map(([store, items]) => (
                            <div key={store}>
                                {store && <div style={{display:'flex', alignItems:'center', gap:8, padding:'8px 4px 4px'}}><StoreBadge store={store}/><span style={{fontSize:11, fontWeight:700, letterSpacing:'.06em', textTransform:'uppercase', color:'var(--mu)'}}>{store}</span></div>}
                                <div className="card" style={{overflow:'hidden'}}>
                                    {items.map(it => (
                                        <div className="row" key={it.id}>
                                            <div className="qty">
                                                <button className="qb" onClick={()=>upd(it.id,{quantity:Math.max(1,(it.quantity||1)-1)})}><Ico n="minus" s={13}/></button>
                                                <span className="qv">{it.quantity||1}</span>
                                                <button className="qb" onClick={()=>upd(it.id,{quantity:(it.quantity||1)+1})}><Ico n="plus" s={13}/></button>
                                            </div>
                                            <div style={{flex:1, paddingLeft:8, display:'flex', flexDirection:'column', gap:1}}>
                                                <span style={{fontSize:14, fontWeight:500}}>{it.name}</span>
                                                {it.note && <span style={{fontSize:11, color:'var(--mu)', fontStyle:'italic'}}>{it.note}</span>}
                                            </div>
                                            {it.currentPrice>0 && <span style={{fontFamily:'DM Mono', fontSize:14, color:'var(--ac)', fontWeight:500}}>{fmt(it.currentPrice*(it.quantity||1))} €</span>}
                                            {it.oneshot && <button className="db" onClick={()=>del(it.id)}><Ico n="x" s={13}/></button>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                )}

                {view==='scanner' && (
                    <div className="fu" style={{padding:'20px 16px', display:'flex', flexDirection:'column', gap:12}}>
                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                            <span className="pt">Scanner</span>
                            <span className="chip" style={{fontFamily:'DM Mono', fontSize:10}}>Gemini 2.5</span>
                        </div>
                        {preview && (
                            <div className="sp2">
                                <img src={preview} alt="ticket"/>
                                {scanning && <div className="sov"><div className="ld"></div><span style={{color:'#fff', fontSize:12, fontWeight:600}}>Analyse en cours…</span></div>}
                            </div>
                        )}
                        {!result && !scanning && (
                            <div style={{display:'flex', gap:10}}>
                                <label style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:10, background:'#fff', border:'1.5px dashed var(--ac)', borderRadius:16, padding:'20px 12px', cursor:'pointer'}}>
                                    <div style={{width:52, height:52, borderRadius:14, background:'var(--acl)', display:'flex', alignItems:'center', justifyContent:'center'}}><Ico n="cam" s={24} c="var(--ac)"/></div>
                                    <div style={{textAlign:'center'}}>
                                        <div style={{fontWeight:700, fontSize:13}}>Caméra</div>
                                        <div style={{fontSize:11, color:'var(--mu)', marginTop:1}}>Photo directe</div>
                                    </div>
                                    <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={onFile}/>
                                </label>

                                    <div style={{width:52, height:52, borderRadius:14, background:'var(--sf2)', display:'flex', alignItems:'center', justifyContent:'center'}}><Ico n="list" s={24} c="var(--mu)"/></div>
                                    <div style={{textAlign:'center'}}>
                                        <div style={{fontWeight:700, fontSize:13}}>Galerie</div>
                                        <div style={{fontSize:11, color:'var(--mu)', marginTop:1}}>Depuis les photos</div>
                                    </div>
                                    <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={onFile}/>
                                </label>
                            </div>
                        )}
                        {result && !scanning && (
                            <div className="card fu" style={{overflow:'hidden'}}>
                                <div style={{padding:'12px 16px', borderBottom:'1px solid var(--bdl)', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                                    <div style={{display:'flex', alignItems:'center', gap:8}}><Ico n="ok" s={16} c="var(--dn)"/><span style={{fontWeight:700, fontSize:14}}>{result.length} articles détectés</span></div>
                                    <button className="db" onClick={() => {setResult(null); setPreview(null); setScanStore('');}}><Ico n="x" s={16}/></button>
                                </div>
                                <div style={{padding:'10px 14px', borderBottom:'1px solid var(--bdl)', display:'flex', alignItems:'center', gap:8, background:'var(--sf2)'}}>
                                    <StoreBadge store={scanStore}/>
                                    <input
                                        className="inp"
                                        placeholder="Magasin détecté (modifiable)…"
                                        value={scanStore}
                                        onChange={e => setScanStore(e.target.value)}
                                        list="stores-datalist"
                                        style={{fontSize:13, padding:'7px 12px', flex:1, background:'#fff'}}
                                    />
                                </div>
                                <div style={{maxHeight:280, overflowY:'auto'}}>
                                    {result.map((it,i) => (
                                        <div className="si" key={i} style={{gap:8, paddingRight:8}}>
                                            <input
                                                value={it.name}
                                                onChange={e => { const r=[...result]; r[i]={...r[i],name:e.target.value}; setResult(r); }}
                                                style={{flex:1, background:'none', border:'none', fontSize:13, color:'var(--tx2)', fontFamily:'Figtree,sans-serif', outline:'none', minWidth:0}}
                                            />
                                            <input
                                                type="number" step="0.01"
                                                value={it.price}
                                                onChange={e => { const r=[...result]; r[i]={...r[i],price:parseFloat(e.target.value)||0}; setResult(r); }}
                                                style={{width:60, fontFamily:'DM Mono', fontSize:13, color:'var(--ac)', fontWeight:500, background:'none', border:'none', outline:'none', textAlign:'right'}}
                                            />
                                            <span style={{fontSize:12, color:'var(--mu)'}}>€</span>
                                            <button onClick={() => setResult(result.filter((_,j)=>j!==i))} style={{background:'none', border:'none', color:'var(--bd)', cursor:'pointer', padding:'2px 4px', flexShrink:0, display:'flex', alignItems:'center'}}><Ico n="x" s={13}/></button>
                                        </div>
                                    ))}
                                </div>
                                <div style={{padding:14, display:'flex', gap:8, borderTop:'1px solid var(--bdl)'}}>
                                    <button className="bs" style={{flex:1}} onClick={() => {setResult(null); setPreview(null); setScanStore('');}}>Annuler</button>
                                    <button className="bp" style={{flex:2}} onClick={importScan}>Importer dans le catalogue</button>
                                </div>
                            </div>
                        )}
                    </div>
                )}

                {view==='budget' && (
                    <div className="fu" style={{padding:'20px 16px', display:'flex', flexDirection:'column', gap:12}}>
                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                            <span className="pt">Budget</span>
                            <div style={{display:'flex', alignItems:'center', gap:8}}>
                                <span style={{fontSize:12, color:'var(--mu)'}}>Cible :</span>
                                <input type="number" className="pi" placeholder="0" defaultValue={monthlyBudget||''}
                                    onBlur={e=>saveBudget(e.target.value)}
                                    style={{width:72, textAlign:'right', fontSize:13, background:'var(--sf2)', borderRadius:8, padding:'4px 8px'}}
                                />
                                <span style={{fontSize:12, color:'var(--mu)'}}>€/mois</span>
                            </div>
                        </div>
                        <div className="hero">
                            <div style={{fontSize:11, fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase', opacity:.75, marginBottom:6}}>{now.toLocaleString('fr-FR',{month:'long',year:'numeric'})}</div>
                            <div className="ha">{fmt(mTotal)} €{monthlyBudget>0 && <span style={{fontSize:16,fontWeight:500,opacity:.7}}> / {fmt(monthlyBudget)} €</span>}</div>
                            {monthlyBudget>0 && (
                                <div style={{margin:'10px 0 2px', background:'rgba(255,255,255,.2)', borderRadius:6, height:8, overflow:'hidden'}}>
                                    <div style={{height:'100%', borderRadius:6, background:mTotal/monthlyBudget>0.9?'#ff6b6b':'#fff', width:Math.min(100,mTotal/monthlyBudget*100)+'%', transition:'width .4s'}}/>
                                </div>
                            )}
                            <div style={{marginTop:10, display:'flex', gap:8, flexWrap:'wrap'}}>
                                <span className="pl"><Ico n="rec" s={12} c="white"/> {mCount} ticket{mCount>1?'s':''}</span>
                                {mDelta!==null && <span className="pl"><Ico n={parseFloat(mDelta)>=0?'tup':'tdn'} s={12} c="white"/>{parseFloat(mDelta)>=0?'+':''}{mDelta}% vs mois dernier</span>}
                                {monthlyBudget>0 && <span className="pl" style={{background:mTotal/monthlyBudget>0.9?'rgba(255,107,107,.35)':'rgba(255,255,255,.15)'}}>{fmt(monthlyBudget-mTotal)} € restants</span>}
                            </div>
                        </div>
                        {last6Months.some(m=>m.total>0) && (() => {
                            const maxVal = Math.max(...last6Months.map(m=>m.total), monthlyBudget||0, 1);
                            const W=44, GAP=8, H=90, PAD=8;
                            const totalW = last6Months.length*(W+GAP)-GAP;
                            return (
                                <div className="card" style={{padding:'16px 16px 12px'}}>
                                    <div className="st" style={{marginBottom:12}}>6 derniers mois</div>
                                    <div style={{overflowX:'auto'}}>
                                        <svg width={totalW+PAD*2} height={H+32} style={{display:'block', margin:'0 auto'}}>
                                            {monthlyBudget>0 && (
                                                <line
                                                    x1={PAD} y1={H-(monthlyBudget/maxVal)*(H-8)+4}
                                                    x2={totalW+PAD} y2={H-(monthlyBudget/maxVal)*(H-8)+4}
                                                    stroke="rgba(59,110,245,.25)" strokeWidth="1.5" strokeDasharray="4,3"
                                                />
                                            )}
                                            {last6Months.map((m,i) => {
                                                const x = PAD+i*(W+GAP);
                                                const barH = m.total>0 ? Math.max(4,(m.total/maxVal)*(H-8)) : 0;
                                                const y = H-barH+4;
                                                const over = monthlyBudget>0 && m.total>monthlyBudget;
                                                const color = m.isCurrent ? 'var(--ac)' : over ? 'var(--up)' : '#c5d0f5';
                                                return (
                                                    <g key={i}>
                                                        <rect x={x} y={y} width={W} height={barH} rx={6} fill={color}/>
                                                        {m.total>0 && <text x={x+W/2} y={y-5} textAnchor="middle" fontSize="9" fontWeight="600" fill={m.isCurrent?'var(--ac)':over?'var(--up)':'var(--mu)'} fontFamily="DM Mono,monospace">{Math.round(m.total)}€</text>}
                                                        <text x={x+W/2} y={H+18} textAnchor="middle" fontSize="10" fontWeight={m.isCurrent?700:500} fill={m.isCurrent?'var(--tx)':'var(--mu)'} fontFamily="Figtree,sans-serif" textTransform="capitalize">{m.label}</text>
                                                    </g>
                                                );
                                            })}
                                        </svg>
                                    </div>
                                    {monthlyBudget>0 && <div style={{display:'flex', alignItems:'center', gap:6, marginTop:4, justifyContent:'center'}}><div style={{width:20, height:2, background:'rgba(59,110,245,.4)', borderRadius:2, borderTop:'1.5px dashed rgba(59,110,245,.4)'}}/><span style={{fontSize:11, color:'var(--mu)'}}>Cible {fmt(monthlyBudget)} €</span></div>}
                                </div>
                            );
                        })()}
                        {receipts.length>0 && (
                            <>
                                <div className="st" style={{marginBottom:0}}>Historique</div>
                                <div className="card" style={{overflow:'hidden'}}>
                                    {[...receipts].sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0,15).map(r => (
                                        <div className="rr" key={r.id}>
                                            <div>
                                                <div style={{fontWeight:600, fontSize:14}}>{new Date(r.date).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</div>
                                                <div style={{fontSize:12, color:'var(--mu)', marginTop:1}}>{r.itemCount} articles</div>
                                            </div>
                                            <span style={{fontFamily:'DM Mono', fontSize:14, fontWeight:500, color:'var(--tx2)'}}>{fmt(r.total)} €</span>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}
                        {receipts.length===0 && <div className="card"><div className="em"><div className="ei"><Ico n="bar" s={24} c="var(--bd)"/></div>Aucun ticket enregistré</div></div>}
                    </div>
                )}

                <nav className="nav">
                    {[
                        {id:'accueil',   n:'home', l:'Accueil'},
                        {id:'catalogue', n:'grid', l:'Catalogue'},
                        {id:'liste',     n:'list', l:'Liste',   badge:shopList.length},
                        {id:'scanner',   n:'cam',  l:'Scanner'},
                        {id:'budget',    n:'bar',  l:'Budget'},
                    ].map(t => (
                        <button key={t.id} className={"nb "+(view===t.id?'on':'')} onClick={() => setView(t.id)}>
                            {t.badge>0 && <span className="bdg">{t.badge}</span>}
                            <Ico n={t.n} s={21} c={view===t.id?'var(--ac)':'var(--mu)'}/>
                            {t.l}
                        </button>
                    ))}
                </nav>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
