    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Animations */
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-accent {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }
    @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
    }

    .fade-up { animation: fadeUp 0.25s ease-out both; }
    .spin { animation: spin 1s linear infinite; }
    .pulse-accent { animation: pulse-accent 1.5s ease-in-out infinite; }

    /* Nav */
    .nav-bar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        display: flex;
        z-index: 100;
        padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        padding: 10px 0 8px;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        transition: color 0.15s;
        position: relative;
        cursor: pointer;
        border: none;
        background: none;
    }
    .nav-btn.active {
        color: var(--accent);
    }
    .nav-btn.active::after {
        content: '';
        position: absolute;
        top: 0; left: 25%; right: 25%;
        height: 2px;
        background: var(--accent);
        border-radius: 0 0 2px 2px;
    }
    .nav-badge {
        position: absolute;
        top: 6px; right: calc(50% - 18px);
        background: var(--danger);
        color: white;
        font-size: 9px;
        font-weight: 700;
        width: 16px; height: 16px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        border: 2px solid var(--surface);
    }

    /* Cards */
    .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
    }
    .card-tight {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
    }

    /* Input */
    .inp {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        padding: 10px 14px;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        width: 100%;
        outline: none;
        transition: border-color 0.15s;
    }
    .inp:focus { border-color: var(--accent); }
    .inp::placeholder { color: var(--muted); }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* Buttons */
    .btn-accent {
        background: var(--accent);
        color: #0c0c0e;
        font-weight: 700;
        font-size: 13px;
        border: none;
        border-radius: 10px;
        padding: 11px 20px;
        cursor: pointer;
        transition: opacity 0.15s, transform 0.1s;
        letter-spacing: 0.02em;
    }
    .btn-accent:active { transform: scale(0.97); opacity: 0.85; }

    .btn-ghost {
        background: var(--surface2);
        color: var(--text);
        font-weight: 500;
        font-size: 13px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 20px;
        cursor: pointer;
        transition: border-color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--muted); }

    /* Product row */
    .product-row {
        display: flex;
        align-items: center;
        padding: 11px 14px;
        border-bottom: 1px solid var(--border);
        gap: 10px;
        transition: background 0.1s;
    }
    .product-row:last-child { border-bottom: none; }
    .product-row:active { background: var(--surface2); }

    .check-btn {
        width: 28px; height: 28px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: none;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
        transition: all 0.15s;
    }
    .check-btn.checked {
        background: var(--accent);
        border-color: var(--accent);
    }

    /* Price tag */
    .price-tag {
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        color: var(--accent);
        background: var(--accent-dim);
        padding: 3px 8px;
        border-radius: 6px;
    }

    .scan-drop {
        border: 1.5px dashed var(--border);
        border-radius: 20px;
        padding: 48px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        transition: border-color 0.2s;
        cursor: pointer;
    }
    .scan-drop:hover { border-color: var(--accent); }

        width: 72px; height: 72px;
        border-radius: 20px;
        background: var(--accent-dim);
        display: flex; align-items: center; justify-content: center;
        color: var(--accent);

    .scan-overlay {
        position: absolute; inset: 0;
        background: rgba(12,12,14,0.7);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 12px;
        border-radius: 16px;

        position: relative;
        width: 100%;
        height: 220px;
        border-radius: 16px;
        overflow: hidden;
        background: #000;
    }
    .scan-preview img {
        width: 100%; height: 100%;
        object-fit: cover;
        opacity: 0.5;
    }

    /* Stats */
    .stat-block {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
    }
    .stat-amount {
        font-family: 'Syne', sans-serif;
        font-size: 48px;
        font-weight: 800;
        color: var(--accent);
        line-height: 1;
        letter-spacing: -0.02em;
    }

    /* Shopping total */
    .total-bar {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px 18px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
    }

    /* Qty control */
    .qty-ctrl {
        display: flex;
        align-items: center;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
    }
    .qty-btn {
        width: 28px; height: 28px;
        display: flex; align-items: center; justify-content: center;
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        transition: color 0.1s;
    }
    .qty-btn:active { color: var(--accent); }
    .qty-val {
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        min-width: 24px;
        text-align: center;
    }

    /* Receipt row */
    .receipt-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
    }
    .receipt-row:last-child { border-bottom: none; }

    /* Header */
    .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
    }
    .page-title {
        font-family: 'Syne', sans-serif;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.01em;
    }

    /* Chip */
    .chip {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 5px;
        background: var(--surface2);
        color: var(--muted);
        border: 1px solid var(--border);
    }
    .chip.accent {
        background: var(--accent-dim);
        color: var(--accent);
        border-color: rgba(184,249,74,0.2);
    }

    /* Inline price input */
    .price-inp {
        background: transparent;
        border: none;
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        color: var(--accent);
        width: 64px;
        text-align: right;
        outline: none;
        padding: 3px 6px;
        border-radius: 6px;
        transition: background 0.15s;
    }
    .price-inp:focus {
        background: var(--accent-dim);
    }

    /* Delete */
    .del-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        padding: 4px;
        border-radius: 6px;
        transition: color 0.15s, background 0.15s;
        display: flex; align-items: center; justify-content: center;
    }
    .del-btn:hover { color: var(--danger); background: var(--danger-dim); }

    /* Scan result item */
    .scan-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
    }
    .scan-item:last-child { border-bottom: none; }

    /* Loader */
    .loader-ring {
        width: 40px; height: 40px;
        border: 2.5px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    /* Scrollable results */
    .results-scroll {
        max-height: 280px;
        overflow-y: auto;
    }
</style>

    // ─── Config ───────────────────────────────────────────────────────────────
    const GEMINI_KEY = "AIzaSyAuArHz7LW2h9qF78k2fEEjBhEagPDOtjI";
    const GEMINI_MODEL = "gemini-2.5-flash";
    const APP_ID = "panier-malin-prod";

    // ─── App ──────────────────────────────────────────────────────────────────
    const App = () => {
        const [user, setUser]           = useState(null);
        const [view, setView]           = useState('catalogue');
        const [products, setProducts]   = useState([]);
        const [receipts, setReceipts]   = useState([]);
        const [loading, setLoading]     = useState(true);
        const [isScanning, setIsScanning] = useState(false);
        const [scanResult, setScanResult] = useState(null);
        const [previewUrl, setPreviewUrl] = useState(null);
        const [newItem, setNewItem]     = useState({ name: '', price: '' });
        const [search, setSearch]       = useState('');
        const fileRef = useRef();

        // Firebase auth
        useEffect(() => {
            if (!window.firebase) return;
            const { auth, onAuthStateChanged, signInAnonymously } = window.firebase;
            signInAnonymously(auth).catch(console.error);
            return onAuthStateChanged(auth, u => { setUser(u); if (!u) setLoading(false); });
        }, []);

        // Firestore listeners
        useEffect(() => {
            if (!user || !window.firebase) return;
            const { db, collection, onSnapshot } = window.firebase;
            const base = `artifacts/${APP_ID}/users/${user.uid}`;
            const u1 = onSnapshot(collection(db, base, 'products'), snap => {
                setProducts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                setLoading(false);
            }, () => setLoading(false));
            const u2 = onSnapshot(collection(db, base, 'receipts'), snap => {
                setReceipts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            });
            return () => { u1(); u2(); };
        }, [user]);

        // ── Firestore helpers ─────────────────────────────────────────────────
        const dbPath = (...parts) => {
            const { db, doc } = window.firebase;
            return doc(db, 'artifacts', APP_ID, 'users', user.uid, ...parts);
        };

        const updateProd = (id, fields) => window.firebase.updateDoc(dbPath('products', id), fields);
        const deleteProd = (id) => window.firebase.deleteDoc(dbPath('products', id));
        const saveProd   = (p) => {
            const id = p.id || Date.now().toString();
            window.firebase.setDoc(dbPath('products', id), { ...p, id }, { merge: true });
        };
        const addReceipt = (data) => {
            const { db, collection, addDoc, serverTimestamp } = window.firebase;
            return addDoc(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'receipts'), {
                ...data, timestamp: serverTimestamp()
            });
        };

        // ── Image resize ──────────────────────────────────────────────────────
        const resizeImage = (file) => new Promise(resolve => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = e => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 1200;
                    const scale = MAX / img.width;
                    canvas.width = MAX;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.85));
                };
            };
        });

        // ── Gemini scan ───────────────────────────────────────────────────────
        const handleFileSelect = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setIsScanning(true);
            setPreviewUrl(URL.createObjectURL(file));
            setScanResult(null);
            try {
                const b64 = await resizeImage(file);
                const prompt = `Analyse ce ticket de caisse. Extrais chaque article avec son nom et son prix. Retourne UNIQUEMENT un JSON : { "items": [ { "name": "...", "price": 0.00 } ] }`;
                const res = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_KEY}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/jpeg", data: b64.split(',')[1] } }
                            ]}],
                            generationConfig: {
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        items: {
                                            type: "ARRAY",
                                            items: {
                                                type: "OBJECT",
                                                properties: { name: { type: "STRING" }, price: { type: "NUMBER" } },
                                                required: ["name", "price"]
                                            }
                                        }
                                    },
                                    required: ["items"]
                                }
                            }
                        })
                    }
                );
                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || 'API error');
                const parsed = JSON.parse(data.candidates[0].content.parts[0].text);
                setScanResult(parsed.items);
            } catch (err) {
                console.error(err);
                alert("Erreur d'analyse : " + (err.message || "Photo trop floue ou ticket illisible."));
            } finally {
                setIsScanning(false);
            }
        };

        const importScan = async () => {
            const total = scanResult.reduce((s, i) => s + i.price, 0);
            await addReceipt({ date: new Date().toISOString(), total, itemCount: scanResult.length });
            for (const s of scanResult) {
                const match = products.find(p =>
                    p.name.toLowerCase().includes(s.name.toLowerCase()) ||
                    s.name.toLowerCase().includes(p.name.toLowerCase())
                );
                if (match) updateProd(match.id, { lastPrice: match.currentPrice, currentPrice: s.price });
                else saveProd({ name: s.name, currentPrice: s.price, lastPrice: s.price, isNeeded: false, quantity: 1 });
            }
            setScanResult(null); setPreviewUrl(null); setView('catalogue');
        };

        // ── Derived ───────────────────────────────────────────────────────────
        const shoppingList = useMemo(() => products.filter(p => p.isNeeded), [products]);
        const shoppingTotal = useMemo(() => shoppingList.reduce((s, p) => s + p.currentPrice * (p.quantity || 1), 0), [shoppingList]);
        const filteredProducts = useMemo(() => {
            const q = search.toLowerCase();
            return products
                .filter(p => p.name.toLowerCase().includes(q))
                .sort((a, b) => a.name.localeCompare(b.name));
        }, [products, search]);
        const monthTotal = useMemo(() => {
            const now = new Date();
            return receipts.filter(r => {
                const d = new Date(r.date);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            }).reduce((s, r) => s + (r.total || 0), 0);
        }, [receipts]);

        // ── Loading ───────────────────────────────────────────────────────────
        if (loading) return (
            <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
                <div className="loader-ring"></div>
                <span style={{ fontFamily: 'DM Mono', fontSize: 12, color: 'var(--muted)', letterSpacing: '0.1em' }}>CHARGEMENT...</span>
            </div>
        );

        // ── Render ────────────────────────────────────────────────────────────
        return (
            <div style={{ paddingBottom: 80, minHeight: '100vh' }}>

                {/* ── CATALOGUE ── */}
                {view === 'catalogue' && (
                    <div className="fade-up" style={{ padding: '20px 16px' }}>
                        <div className="page-header">
                            <span className="page-title">Catalogue</span>
                            <span className="chip accent">{products.length} produits</span>
                        </div>

                        {/* Add form */}
                        <div className="card" style={{ padding: 14, marginBottom: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
                            <input
                                className="inp"
                                placeholder="Nom du produit"
                                value={newItem.name}
                                onChange={e => setNewItem({ ...newItem, name: e.target.value })}
                                onKeyDown={e => {
                                    if (e.key === 'Enter' && newItem.name && newItem.price) {
                                        saveProd({ ...newItem, currentPrice: parseFloat(newItem.price), lastPrice: parseFloat(newItem.price), isNeeded: false, quantity: 1 });
                                        setNewItem({ name: '', price: '' });
                                    }
                                }}
                            />
                            <div style={{ display: 'flex', gap: 8 }}>
                                <input
                                    className="inp"
                                    type="number"
                                    step="0.01"
                                    placeholder="Prix €"
                                    value={newItem.price}
                                    onChange={e => setNewItem({ ...newItem, price: e.target.value })}
                                    style={{ flex: 1 }}
                                />
                                <button className="btn-accent" onClick={() => {
                                    if (!newItem.name || !newItem.price) return;
                                    saveProd({ ...newItem, currentPrice: parseFloat(newItem.price), lastPrice: parseFloat(newItem.price), isNeeded: false, quantity: 1 });
                                    setNewItem({ name: '', price: '' });
                                }}>
                                    Ajouter
                                </button>
                            </div>
                        </div>

                        {/* Search */}
                        {products.length > 4 && (
                            <input
                                className="inp"
                                placeholder="Rechercher..."
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                                style={{ marginBottom: 10 }}
                            />
                        )}

                        {/* List */}
                        <div className="card" style={{ overflow: 'hidden' }}>
                            {filteredProducts.length === 0 && (
                                <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)', fontSize: 13 }}>
                                    Aucun produit
                                </div>
                            )}
                            {filteredProducts.map(p => (
                                <div className="product-row" key={p.id}>
                                    <button
                                        className={`check-btn ${p.isNeeded ? 'checked' : ''}`}
                                        onClick={() => updateProd(p.id, { isNeeded: !p.isNeeded })}
                                    >
                                        {p.isNeeded && <Icon name="check" size={14} style={{ color: '#0c0c0e' }} />}
                                    </button>
                                    <span style={{ flex: 1, fontSize: 14, fontWeight: 500, color: p.isNeeded ? 'var(--text)' : 'var(--muted)' }}>
                                        {p.name}
                                    </span>
                                    {p.lastPrice && p.lastPrice !== p.currentPrice && (
                                        <span style={{ fontFamily: 'DM Mono', fontSize: 10, color: 'var(--muted)', textDecoration: 'line-through', marginRight: 4 }}>
                                            {p.lastPrice.toFixed(2)}
                                        </span>
                                    )}
                                    <input
                                        type="number"
                                        step="0.01"
                                        className="price-inp"
                                        defaultValue={p.currentPrice?.toFixed(2)}
                                        key={p.currentPrice}
                                        onBlur={e => updateProd(p.id, { lastPrice: p.currentPrice, currentPrice: parseFloat(e.target.value) })}
                                    />
                                    <button className="del-btn" onClick={() => { if (confirm('Supprimer ?')) deleteProd(p.id); }}>
                                        <Icon name="trash" size={15} />
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* ── LISTE ── */}
                {view === 'liste' && (
                    <div className="fade-up" style={{ padding: '20px 16px' }}>
                        <div className="page-header">
                            <span className="page-title">Ma Liste</span>
                            <span className="chip">{shoppingList.length} articles</span>
                        </div>

                        {/* Total */}
                        <div className="total-bar" style={{ marginBottom: 14 }}>
                            <div>
                                <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 2 }}>Estimation</div>
                                <div className="stat-amount" style={{ fontSize: 36 }}>{shoppingTotal.toFixed(2)} €</div>
                            </div>
                            {shoppingList.length > 0 && (
                                <button
                                    className="btn-accent"
                                    onClick={async () => {
                                        await addReceipt({ date: new Date().toISOString(), total: shoppingTotal, itemCount: shoppingList.length });
                                        for (const item of shoppingList) updateProd(item.id, { isNeeded: false, quantity: 1 });
                                        setView('stats');
                                    }}
                                    style={{ fontSize: 12, padding: '10px 16px' }}
                                >
                                    Terminer
                                </button>
                            )}
                        </div>

                        {/* Items */}
                        <div className="card" style={{ overflow: 'hidden' }}>
                            {shoppingList.length === 0 && (
                                <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)', fontSize: 13 }}>
                                    Liste vide — coche des produits dans le catalogue
                                </div>
                            )}
                            {shoppingList.map(item => (
                                <div className="product-row" key={item.id}>
                                    <div className="qty-ctrl">
                                        <button className="qty-btn" onClick={() => updateProd(item.id, { quantity: Math.max(1, (item.quantity || 1) - 1) })}>
                                            <Icon name="minus" size={12} />
                                        </button>
                                        <span className="qty-val">{item.quantity || 1}</span>
                                        <button className="qty-btn" onClick={() => updateProd(item.id, { quantity: (item.quantity || 1) + 1 })}>
                                            <Icon name="plus" size={12} />
                                        </button>
                                    </div>
                                    <span style={{ flex: 1, fontSize: 14, fontWeight: 500, paddingLeft: 10 }}>{item.name}</span>
                                    <span className="price-tag">{(item.currentPrice * (item.quantity || 1)).toFixed(2)} €</span>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* ── SCANNER ── */}
                {view === 'scanner' && (
                    <div className="fade-up" style={{ padding: '20px 16px' }}>
                        <div className="page-header">
                            <span className="page-title">Scanner</span>
                            <span className="chip accent mono">Gemini 1.5</span>
                        </div>

                        {/* Preview */}
                        {previewUrl && (
                            <div className="scan-preview" style={{ marginBottom: 14 }}>
                                <img src={previewUrl} alt="ticket" />
                                {isScanning && (
                                    <div className="scan-overlay">
                                        <div className="loader-ring"></div>
                                        <span className="mono pulse-accent" style={{ fontSize: 11, letterSpacing: '0.1em' }}>ANALYSE EN COURS...</span>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Drop zone */}
                        {!scanResult && !isScanning && (
                            <label className="scan-drop">
                                <div className="scan-icon-wrap">
                                    <Icon name="camera" size={32} />
                                </div>
                                <div style={{ textAlign: 'center' }}>
                                    <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 4 }}>
                                        {previewUrl ? 'Changer de ticket' : 'Choisir un ticket'}
                                    </div>
                                    <div style={{ fontSize: 12, color: 'var(--muted)' }}>Photo ou galerie</div>
                                </div>
                                <input
                                    ref={fileRef}
                                    type="file"
                                    accept="image/*"
                                    style={{ display: 'none' }}
                                    onChange={handleFileSelect}
                                />
                            </label>
                        )}

                        {/* Results */}
                        {scanResult && !isScanning && (
                            <div className="card fade-up" style={{ overflow: 'hidden' }}>
                                <div style={{
                                    padding: '12px 16px',
                                    borderBottom: '1px solid var(--border)',
                                    display: 'flex', alignItems: 'center', justifyContent: 'space-between'
                                }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                        <Icon name="ok" size={16} style={{ color: 'var(--accent)' }} />
                                        <span style={{ fontWeight: 700, fontSize: 14 }}>{scanResult.length} articles</span>
                                    </div>
                                    <button className="del-btn" onClick={() => { setScanResult(null); setPreviewUrl(null); }}>
                                        <Icon name="x" size={16} />
                                    </button>
                                </div>
                                <div className="results-scroll">
                                    {scanResult.map((it, i) => (
                                        <div className="scan-item" key={i}>
                                            <span style={{ fontSize: 13, color: 'var(--text)', flex: 1, paddingRight: 12 }}>{it.name}</span>
                                            <span className="price-tag">{it.price.toFixed(2)} €</span>
                                        </div>
                                    ))}
                                </div>
                                <div style={{ padding: 14, display: 'flex', gap: 8, borderTop: '1px solid var(--border)' }}>
                                    <button className="btn-ghost" style={{ flex: 1 }} onClick={() => { setScanResult(null); setPreviewUrl(null); }}>
                                        Annuler
                                    </button>
                                    <button className="btn-accent" style={{ flex: 2 }} onClick={importScan}>
                                        Importer dans le catalogue
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                )}

                {/* ── STATS ── */}
                {view === 'stats' && (
                    <div className="fade-up" style={{ padding: '20px 16px' }}>
                        <div className="page-header">
                            <span className="page-title">Budget</span>
                        </div>

                        {/* Month total */}
                        <div className="stat-block" style={{ marginBottom: 14 }}>
                            <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 8 }}>
                                {new Date().toLocaleString('fr-FR', { month: 'long', year: 'numeric' })}
                            </div>
                            <div className="stat-amount">{monthTotal.toFixed(2)} €</div>
                            <div style={{ marginTop: 12, display: 'flex', gap: 8 }}>
                                <span className="chip accent">{receipts.filter(r => {
                                    const d = new Date(r.date);
                                    const n = new Date();
                                    return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
                                }).length} tickets ce mois</span>
                                <span className="chip">{receipts.length} total</span>
                            </div>
                        </div>

                        {/* Receipts */}
                        {receipts.length > 0 && (
                            <div className="card" style={{ overflow: 'hidden' }}>
                                <div style={{ padding: '10px 14px', borderBottom: '1px solid var(--border)', fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--muted)' }}>
                                    Historique
                                </div>
                                {[...receipts].sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0,10).map(r => (
                                    <div className="receipt-row" key={r.id}>
                                        <div>
                                            <div style={{ fontSize: 13, fontWeight: 600 }}>
                                                {new Date(r.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' })}
                                            </div>
                                            <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>
                                                {r.itemCount} articles
                                            </div>
                                        </div>
                                        <span className="price-tag">{(r.total || 0).toFixed(2)} €</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {receipts.length === 0 && (
                            <div style={{ padding: 40, textAlign: 'center', color: 'var(--muted)', fontSize: 13 }}>
                                Pas encore de tickets enregistrés
                            </div>
                        )}
                    </div>
                )}

                {/* ── NAV ── */}
                <nav className="nav-bar">
                    {[
                        { id: 'catalogue', icon: 'grid',    label: 'Catalogue' },
                        { id: 'liste',     icon: 'list',    label: 'Liste', badge: shoppingList.length },
                        { id: 'scanner',   icon: 'camera',  label: 'Scanner' },
                        { id: 'stats',     icon: 'chart',   label: 'Budget' },
                    ].map(tab => (
                        <button key={tab.id} className={`nav-btn ${view === tab.id ? 'active' : ''}`} onClick={() => setView(tab.id)}>
                            {tab.badge > 0 && <span className="nav-badge">{tab.badge}</span>}
                            <Icon name={tab.icon} size={20} />
                            {tab.label}
                        </button>
                    ))}
                </nav>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
