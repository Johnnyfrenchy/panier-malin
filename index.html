        .pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600}

    const reader = new FileReader();

        const img = new Image();

        img.onload = () => {
            const canvas = document.createElement('canvas');

            canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
            resolve(canvas.toDataURL('image/jpeg',.85));
        };
    };
});

                                    </div>
                                    <span style={{fontFamily:'DM Mono',fontSize:14,fontWeight:500,color:'var(--text2)'}}>{fmt(r.total)} €</span>
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        )}
  
        {view==='catalogue' && (
            <div className="fu" style={{padding:'20px 16px',display:'flex',flexDirection:'column',gap:12}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span className="ptitle">Catalogue</span>
                    <span className="chip">{products.length} produits</span>
                </div>
                <div className="card" style={{padding:14,display:'flex',flexDirection:'column',gap:10}}>
                    <input className="inp" placeholder="Nom du produit" value={newItem.name}
                        onChange={e=>setNew({...newItem,name:e.target.value})}
                        onKeyDown={e=>{if(e.key==='Enter'&&newItem.name&&newItem.price){save({name:newItem.name,currentPrice:parseFloat(newItem.price),lastPrice:parseFloat(newItem.price),isNeeded:false,quantity:1,priceHistory:[]});setNew({name:'',price:''});}}}
                    />
                    <div style={{display:'flex',gap:8}}>
                        <input className="inp" type="number" step="0.01" placeholder="Prix €" value={newItem.price} onChange={e=>setNew({...newItem,price:e.target.value})} style={{flex:1}}/>
                        <button className="btnp" onClick={()=>{if(!newItem.name||!newItem.price)return;save({name:newItem.name,currentPrice:parseFloat(newItem.price),lastPrice:parseFloat(newItem.price),isNeeded:false,quantity:1,priceHistory:[]});setNew({name:'',price:''});}}>Ajouter</button>
                    </div>
                </div>
                {products.length>4 && <input className="inp" placeholder="Rechercher…" value={search} onChange={e=>setSearch(e.target.value)}/>}
                <div className="card" style={{overflow:'hidden'}}>
                    {filtered.length===0 && <div className="empty"><div className="emico"><Ico n="tag" s={24} c="var(--border)"/></div>Aucun produit</div>}
                    {filtered.map(p=>{
                        const d=delta(p.currentPrice,p.lastPrice);
                        const up=d&&parseFloat(d)>0;
                        return (
                            <div className="row" key={p.id}>
                                <button className={"chk "+(p.isNeeded?'on':'')} onClick={()=>upd(p.id,{isNeeded:!p.isNeeded})}>
                                    {p.isNeeded && <Ico n="chk" s={13} c="white"/>}
                                </button>
                                <span style={{flex:1,fontSize:14,fontWeight:500,color:p.isNeeded?'var(--text)':'var(--text2)'}}>{p.name}</span>
                                {d && <span className={"vbadge "+(up?'vup':'vdown')}>{up?'+':''}{d}%</span>}
                                <input type="number" step="0.01" className="pinp"
                                    defaultValue={p.currentPrice?.toFixed(2)}
                                    key={p.id+'-'+p.currentPrice}
                                    onBlur={e=>{const v=parseFloat(e.target.value);if(!isNaN(v)&&v!==p.currentPrice)upd(p.id,{lastPrice:p.currentPrice,currentPrice:v,priceHistory:[...(p.priceHistory||[]),{price:p.currentPrice,date:new Date().toISOString()}]});}}
                                />
                                <button className="delbtn" onClick={()=>{if(confirm('Supprimer ?'))del(p.id);}}><Ico n="trash" s={15}/></button>
                            </div>
                        );
                    })}
                </div>
            </div>
        )}
  
        {view==='liste' && (
            <div className="fu" style={{padding:'20px 16px',display:'flex',flexDirection:'column',gap:12}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span className="ptitle">Ma liste</span>
                    <span style={{fontFamily:'DM Mono',fontSize:13,color:'var(--muted)'}}>{shopList.length} articles</span>
                </div>
                <div className="card" style={{padding:'16px 18px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div>
                        <div style={{fontSize:11,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--muted)',marginBottom:4}}>Estimation</div>
                        <div style={{fontFamily:'DM Mono',fontSize:28,fontWeight:500,color:'var(--accent)',letterSpacing:'-.02em'}}>{fmt(shopTotal)} €</div>
                    </div>
                    {shopList.length>0 && (
                        <button className="btnp" style={{fontSize:13,padding:'10px 16px'}} onClick={async()=>{
                            await addRec({date:new Date().toISOString(),total:shopTotal,itemCount:shopList.length});
                            for(const it of shopList) upd(it.id,{isNeeded:false,quantity:1});
                            setView('accueil');
                        }}>Terminer</button>
                    )}
                </div>
                <div className="card" style={{overflow:'hidden'}}>
                    {shopList.length===0 && <div className="empty"><div className="emico"><Ico n="list" s={24} c="var(--border)"/></div>Coche des produits dans le catalogue</div>}
                    {shopList.map(it=>(
                        <div className="row" key={it.id}>
                            <div className="qty">
                                <button className="qbtn" onClick={()=>upd(it.id,{quantity:Math.max(1,(it.quantity||1)-1)})}><Ico n="minus" s={13}/></button>
                                <span className="qval">{it.quantity||1}</span>
                                <button className="qbtn" onClick={()=>upd(it.id,{quantity:(it.quantity||1)+1})}><Ico n="plus" s={13}/></button>
                            </div>
                            <span style={{flex:1,fontSize:14,fontWeight:500,paddingLeft:8}}>{it.name}</span>
                            <span style={{fontFamily:'DM Mono',fontSize:14,color:'var(--accent)',fontWeight:500}}>{fmt(it.currentPrice*(it.quantity||1))} €</span>
                        </div>
                    ))}
                </div>
            </div>
        )}
  
        {view==='scanner' && (
            <div className="fu" style={{padding:'20px 16px',display:'flex',flexDirection:'column',gap:12}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span className="ptitle">Scanner</span>
                    <span className="chip" style={{fontFamily:'DM Mono',fontSize:10}}>Gemini 2.5</span>
                </div>
                {preview && (
                    <div className="scanprev">
                        <img src={preview} alt="ticket"/>
                        {scanning && <div className="scanov"><div className="loader"></div><span style={{color:'#fff',fontSize:12,fontWeight:600}}>Analyse en cours…</span></div>}
                    </div>
                )}
                {!scanResult && !scanning && (
                    <label className="scanzone">
                        <div style={{width:64,height:64,borderRadius:18,background:'var(--accentl)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <Ico n="cam" s={28} c="var(--accent)"/>
                        </div>
                        <div style={{textAlign:'center'}}>
                            <div style={{fontWeight:700,fontSize:15,marginBottom:3}}>{preview?'Changer de ticket':'Choisir un ticket'}</div>
                            <div style={{fontSize:13,color:'var(--muted)'}}>Photo ou galerie</div>
                        </div>
                        <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={onFile}/>
                    </label>
                )}
                {scanResult && !scanning && (
                    <div className="card fu" style={{overflow:'hidden'}}>
                        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--borderl)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                            <div style={{display:'flex',alignItems:'center',gap:8}}>
                                <Ico n="ok" s={16} c="var(--down)"/>
                                <span style={{fontWeight:700,fontSize:14}}>{scanResult.length} articles détectés</span>
                            </div>
                            <button className="delbtn" onClick={()=>{setScan(null);setPreview(null);}}><Ico n="x" s={16}/></button>
                        </div>
                        <div style={{maxHeight:300,overflowY:'auto'}}>
                            {scanResult.map((it,i)=>(
                                <div className="sitem" key={i}>
                                    <span style={{fontSize:13,color:'var(--text2)',flex:1,paddingRight:12}}>{it.name}</span>
                                    <span style={{fontFamily:'DM Mono',fontSize:13,color:'var(--accent)',fontWeight:500}}>{fmt(it.price)} €</span>
                                </div>
                            ))}
                        </div>
                        <div style={{padding:14,display:'flex',gap:8,borderTop:'1px solid var(--borderl)'}}>
                            <button className="btns" style={{flex:1}} onClick={()=>{setScan(null);setPreview(null);}}>Annuler</button>
                            <button className="btnp" style={{flex:2}} onClick={importScan}>Importer dans le catalogue</button>
                        </div>
                    </div>
                )}
            </div>
        )}
  
        {view==='budget' && (
            <div className="fu" style={{padding:'20px 16px',display:'flex',flexDirection:'column',gap:12}}>
                <span className="ptitle">Budget</span>
                <Hero {...heroProps} />
                {receipts.length>0 && (
                    <>
                        <div className="stitle" style={{marginBottom:0}}>Historique</div>
                        <div className="card" style={{overflow:'hidden'}}>
                            {[...receipts].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,15).map(r=>(
                                <div className="rrow" key={r.id}>
                                    <div>
                                        <div style={{fontWeight:600,fontSize:14}}>{new Date(r.date).toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})}</div>
                                        <div style={{fontSize:12,color:'var(--muted)',marginTop:1}}>{r.itemCount} articles</div>
                                    </div>
                                    <span style={{fontFamily:'DM Mono',fontSize:14,fontWeight:500,color:'var(--text2)'}}>{fmt(r.total)} €</span>
                                </div>
                            ))}
                        </div>
                    </>
                )}
                {receipts.length===0 && <div className="card"><div className="empty"><div className="emico"><Ico n="bar" s={24} c="var(--border)"/></div>Aucun ticket enregistré</div></div>}
            </div>
        )}
  
        <nav className="nav">
            {[
                {id:'accueil', n:'home', l:'Accueil'},
                {id:'catalogue', n:'grid', l:'Catalogue'},
                {id:'liste', n:'list', l:'Liste', badge:shopList.length},
                {id:'scanner', n:'cam', l:'Scanner'},
                {id:'budget', n:'bar', l:'Budget'},
            ].map(t=>(
                <button key={t.id} className={"nb "+(view===t.id?'on':'')} onClick={()=>setView(t.id)}>
                    {t.badge>0 && <span className="badge">{t.badge}</span>}
                    <Ico n={t.n} s={21} c={view===t.id?'var(--accent)':'var(--muted)'}/>
                    {t.l}
                </button>
            ))}
        </nav>
    </div>
  ```
  
  );
  };

ReactDOM.createRoot(document.getElementById(‘root’)).render(<App />);
</script>

</body>
</html>
