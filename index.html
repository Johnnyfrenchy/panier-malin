<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panier Malin</title>
    <!-- Tailwind CSS pour un design moderne -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bibliothèques React et Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Suppression des flèches sur les inputs de prix */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Configuration et Initialisation Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Vos identifiants Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDQ2qyBeT_iLuCF3UEmQ2S93z8Qlv6uJSI",
            authDomain: "panier-malin-c8c25.firebaseapp.com",
            projectId: "panier-malin-c8c25",
            storageBucket: "panier-malin-c8c25.firebasestorage.app",
            messagingSenderId: "372069346066",
            appId: "1:372069346066:web:2ae414eff4b637ac5b21cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Export global pour React
        window.firebase = { auth, db, signInAnonymously, onAuthStateChanged, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, addDoc, serverTimestamp };
    </script>

    <!-- Logique Applicative React -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Composant pour afficher les icônes sans dépendre d'une librairie externe lente
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Plus: <path d="M12 5v14M5 12h14" />,
                Minus: <path d="M5 12h14" />,
                Trash2: <><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><path d="M10 11v6m4-6v6" /></>,
                ShoppingCart: <><circle cx="8" cy="21" r="1" /><circle cx="19" cy="21" r="1" /><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" /></>,
                TrendingUp: <path d="m22 7-8.5 8.5-5-5L2 17m14-10h6v6" />,
                LayoutDashboard: <><rect width="7" height="9" x="3" y="3" rx="1" /><rect width="7" height="5" x="14" y="3" rx="1" /><rect width="7" height="9" x="14" y="12" rx="1" /><rect width="7" height="5" x="3" y="16" rx="1" /></>,
                ListTodo: <><rect width="18" height="18" x="3" y="3" rx="2" /><path d="m9 10 2 2 4-4m-6 8h6" /></>,
                Camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" /><circle cx="12" cy="13" r="3" /></>,
                Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m14-7-5-5-5 5m5-5v12" /></>,
                Loader2: <path d="M21 12a9 9 0 1 1-6.219-8.56" />,
                CheckCircle2: <><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" /><path d="m9 12 2 2 4-4" /></>,
                X: <path d="M18 6 6 18M6 6l12 12" />,
                Cloud: <path d="M17.5 19c3.037 0 5.5-2.463 5.5-5.5 0-2.799-2.078-5.112-4.781-5.446C17.417 4.881 14.72 3 12 3 9.432 3 7.154 4.604 6.273 6.945A5 5 0 0 0 2 11.5c0 2.761 2.239 5 5 5h10.5" />,
                PieChart: <><path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" /></>,
                Calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2" /><line x1="16" x2="16" y1="2" y2="6" /><line x1="8" x2="8" y1="2" y2="6" /><line x1="3" x2="21" y1="10" y2="10" /></>,
                ShieldCheck: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM9 12l2 2 4-4" />,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5 5 5-5m-5 5V3" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} ${name === 'Loader2' ? 'animate-spin' : ''}`}>
                    {icons[name]}
                </svg>
            );
        };

        const apiKey = "AIzaSyAuArHz7LW2h9qF78k2fEEjBhEagPDOtjI"; 
        const appId = "panier-malin-prod";

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('inventory'); 
            const [products, setProducts] = useState([]);
            const [receipts, setReceipts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isScanning, setIsScanning] = useState(false);
            const [scanResult, setScanResult] = useState(null);
            const [previewUrl, setPreviewUrl] = useState(null);
            const [errorMsg, setErrorMsg] = useState(null);
            const [newItem, setNewItem] = useState({ name: '', price: '', category: 'Épicerie' });

            useEffect(() => {
                if (!window.firebase) return;
                const { auth, onAuthStateChanged, signInAnonymously } = window.firebase;
                
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (e) {
                        console.error("Auth error", e);
                        if (e.code === 'auth/configuration-not-found') {
                            setErrorMsg("Action requise : Allez dans la console Firebase > Authentication > Sign-in method et activez le mode 'Anonyme'.");
                        } else {
                            setErrorMsg("Erreur de connexion : " + e.message);
                        }
                        setLoading(false);
                    }
                };
                
                initAuth();
                
                return onAuthStateChanged(auth, u => { 
                    setUser(u); 
                    if(u) setErrorMsg(null);
                    if(!u && !loading) setLoading(false); 
                });
            }, []);

            useEffect(() => {
                if (!user || !window.firebase) return;
                const { db, collection, onSnapshot } = window.firebase;
                const unsubProd = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'products'), (snap) => {
                    const items = []; snap.forEach(d => items.push({ id: d.id, ...d.data() }));
                    setProducts(items); setLoading(false);
                }, () => setLoading(false));
                const unsubRec = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'receipts'), (snap) => {
                    const items = []; snap.forEach(d => items.push({ id: d.id, ...d.data() }));
                    setReceipts(items);
                });
                return () => { unsubProd(); unsubRec(); };
            }, [user]);

            const handleUpdate = (id, fields) => {
                const { db, doc, updateDoc } = window.firebase;
                updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'products', id), fields);
            };

            const handleSave = (p) => {
                const id = p.id || Date.now().toString();
                const { db, doc, setDoc } = window.firebase;
                setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'products', id), { ...p, id }, { merge: true });
            };

            const resizeImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 1024;
                            const scale = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scale;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                    };
                });
            };

            const handleFileSelect = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                setIsScanning(true);
                setPreviewUrl(URL.createObjectURL(file)); 
                
                try {
                    const compressedBase64 = await resizeImage(file);
                    const prompt = `Analyse ce ticket de caisse et extrais chaque article avec son nom et son prix. Retourne UNIQUEMENT un JSON structuré : { "items": [ { "name": "string", "price": number } ] }`;
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: compressedBase64.split(',')[1] } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    const result = await res.json();
                    const jsonText = result.candidates[0].content.parts[0].text;
                    const data = JSON.parse(jsonText);
                    setScanResult(data.items);
                } catch (err) {
                    alert("Impossible de lire ce ticket. Prenez une photo plus stable.");
                    console.error(err);
                } finally {
                    setIsScanning(false);
                }
            };

            const shoppingList = useMemo(() => products.filter(p => p.isNeeded), [products]);
            const shoppingTotal = useMemo(() => shoppingList.reduce((s, c) => s + (c.currentPrice * (c.quantity || 1)), 0), [shoppingList]);
            const monthTotal = useMemo(() => {
                const now = new Date();
                return receipts.filter(r => {
                    const d = new Date(r.date);
                    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                }).reduce((s, r) => s + (r.total || 0), 0);
            }, [receipts]);

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-slate-400 italic">Ouverture de Panier Malin...</div>;

            return (
                <div className="pb-24 md:pb-0 md:pl-64 min-h-screen">
                    {/* Navigation Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-50 md:top-0 md:w-64 md:flex-col md:justify-start md:border-r md:p-6 md:space-y-4">
                        <div className="hidden md:flex items-center space-x-3 mb-8 text-indigo-600 font-black text-xl">
                            <Icon name="ShoppingCart"/><h1 className="text-slate-800">Panier Malin</h1>
                        </div>
                        <button onClick={()=>setView('inventory')} className={`flex flex-col items-center md:flex-row md:space-x-3 p-3 rounded-xl ${view==='inventory'?'text-indigo-600 bg-indigo-50 font-bold':'text-slate-400'}`}><Icon name="LayoutDashboard"/><span>Catalogue</span></button>
                        <button onClick={()=>setView('shopping')} className={`flex flex-col items-center md:flex-row md:space-x-3 p-3 rounded-xl relative ${view==='shopping'?'text-indigo-600 bg-indigo-50 font-bold':'text-slate-400'}`}><Icon name="ListTodo"/><span>Ma Liste</span>{shoppingList.length>0&&<span className="absolute top-2 right-4 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold border-2 border-white">{shoppingList.length}</span>}</button>
                        <button onClick={()=>setView('scan')} className={`flex flex-col items-center md:flex-row md:space-x-3 p-3 rounded-xl ${view==='scan'?'text-indigo-600 bg-indigo-50 font-bold':'text-slate-400'}`}><Icon name="Camera"/><span>Scanner</span></button>
                        <button onClick={()=>setView('stats')} className={`flex flex-col items-center md:flex-row md:space-x-3 p-3 rounded-xl ${view==='stats'?'text-indigo-600 bg-indigo-50 font-bold':'text-slate-400'}`}><Icon name="PieChart"/><span>Stats</span></button>
                    </nav>

                    <main className="p-6 max-w-4xl mx-auto animate-in">
                        {errorMsg && (
                            <div className="bg-red-50 border border-red-200 text-red-700 p-4 rounded-2xl mb-6 shadow-sm flex items-start space-x-3 animate-in">
                                <Icon name="ShieldCheck" className="mt-1 flex-shrink-0" size={20} />
                                <span className="text-sm font-medium">{errorMsg}</span>
                            </div>
                        )}

                        {/* Vue Catalogue */}
                        {view === 'inventory' && (
                            <section className="space-y-6">
                                <h2 className="text-2xl font-black">Mon Catalogue</h2>
                                <div className="bg-white p-4 rounded-2xl shadow-sm border space-y-3">
                                    <input type="text" placeholder="Nom du produit" className="w-full p-3 bg-slate-50 rounded-xl outline-none" value={newItem.name} onChange={e=>setNewItem({...newItem, name:e.target.value})} />
                                    <div className="flex space-x-2">
                                        <input type="number" placeholder="Prix €" className="flex-1 p-3 bg-slate-50 rounded-xl font-bold" value={newItem.price} onChange={e=>setNewItem({...newItem, price:e.target.value})} />
                                        <button onClick={()=>{if(!newItem.name||!newItem.price)return; handleSave({...newItem, currentPrice:parseFloat(newItem.price), lastPrice:parseFloat(newItem.price), isNeeded:false, quantity:1}); setNewItem({name:'', price:'', category:'Épicerie'})}} className="bg-indigo-600 text-white px-6 rounded-xl font-bold shadow-md active:scale-95 transition-all">Ajouter</button>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    {products.sort((a,b)=>a.name.localeCompare(b.name)).map(p => (
                                        <div key={p.id} className="bg-white p-4 rounded-xl border flex items-center justify-between shadow-sm group">
                                            <div className="flex items-center space-x-3">
                                                <button onClick={()=>handleUpdate(p.id, {isNeeded: !p.isNeeded})} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all ${p.isNeeded?'bg-indigo-600 text-white shadow-md':'bg-slate-100 text-slate-300'}`}><Icon name={p.isNeeded?"CheckCircle2":"Plus"} size={18}/></button>
                                                <span className="font-bold">{p.name}</span>
                                            </div>
                                            <div className="flex items-center space-x-4">
                                                <input type="number" step="0.01" className="w-16 text-right font-black bg-slate-50 px-2 py-1 rounded" defaultValue={p.currentPrice} onBlur={e=>handleUpdate(p.id, {lastPrice:p.currentPrice, currentPrice:parseFloat(e.target.value)})} />
                                                <button onClick={()=>{if(confirm('Supprimer ce produit ?')){const {db,doc,deleteDoc}=window.firebase; deleteDoc(doc(db,'artifacts',appId,'users',user.uid,'products',p.id));}}} className="text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="Trash2" size={16}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {/* Vue Liste de Courses */}
                        {view === 'shopping' && (
                            <section className="space-y-6">
                                <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl">
                                    <p className="text-xs font-black uppercase opacity-70 tracking-widest mb-1">Total à payer</p>
                                    <p className="text-5xl font-black">{shoppingTotal.toFixed(2)} €</p>
                                </div>
                                <div className="bg-white rounded-[2rem] shadow-sm border overflow-hidden divide-y">
                                    {shoppingList.map(item => (
                                        <div key={item.id} className="p-5 flex items-center justify-between">
                                            <div className="flex items-center space-x-4">
                                                <div className="flex items-center bg-slate-50 p-1 rounded-lg">
                                                    <button onClick={()=>handleUpdate(item.id, {quantity:Math.max(1,(item.quantity||1)-1)})} className="p-1"><Icon name="Minus" size={14}/></button>
                                                    <span className="w-8 text-center font-bold">{item.quantity||1}</span>
                                                    <button onClick={()=>handleUpdate(item.id, {quantity:(item.quantity||1)+1})} className="p-1"><Icon name="Plus" size={14}/></button>
                                                </div>
                                                <span className="font-bold text-lg">{item.name}</span>
                                            </div>
                                            <span className="font-black text-indigo-600 text-xl">{(item.currentPrice*(item.quantity||1)).toFixed(2)} €</span>
                                        </div>
                                    ))}
                                    {shoppingList.length === 0 && <div className="p-20 text-center text-slate-400 italic">Aucun article dans la liste.</div>}
                                </div>
                                {shoppingList.length > 0 && <button onClick={async ()=>{
                                    const {db,collection,addDoc,serverTimestamp}=window.firebase;
                                    const total = shoppingTotal;
                                    await addDoc(collection(db,'artifacts',appId,'users',user.uid,'receipts'),{date:new Date().toISOString(),total,itemCount:shoppingList.length,timestamp:serverTimestamp()});
                                    for(const item of shoppingList) handleUpdate(item.id,{isNeeded:false,quantity:1});
                                    setView('stats');
                                }} className="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black shadow-xl hover:bg-indigo-700 active:scale-95 transition-all text-lg">Valider les achats</button>}
                            </section>
                        )}

                        {/* Vue Scanner */}
                        {view === 'scan' && (
                            <section className="space-y-6">
                                <h2 className="text-2xl font-black">Scanner un ticket</h2>
                                
                                {previewUrl && (
                                    <div className="relative w-full h-56 bg-black rounded-[2rem] overflow-hidden mb-4 shadow-inner">
                                        <img src={previewUrl} className="w-full h-full object-cover opacity-60" />
                                        {isScanning && (
                                            <div className="absolute inset-0 flex flex-col items-center justify-center text-white">
                                                <Icon name="Loader2" size={50} className="mb-3" />
                                                <span className="font-black text-lg tracking-wide">Analyse Gemini...</span>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {!scanResult && !isScanning && (
                                    <div className="bg-white p-16 rounded-[2.5rem] border-2 border-dashed border-slate-200 flex flex-col items-center">
                                        <div className="bg-indigo-50 p-6 rounded-3xl text-indigo-600 mb-6"><Icon name="Camera" size={40}/></div>
                                        <label className="bg-indigo-600 text-white px-10 py-5 rounded-2xl font-black cursor-pointer shadow-xl active:scale-95 transition-all text-center">
                                            Prendre une photo
                                            <input type="file" className="hidden" accept="image/*" onChange={handleFileSelect} />
                                        </label>
                                        <p className="mt-4 text-xs text-slate-400">Le ticket sera analysé par l'IA</p>
                                    </div>
                                )}

                                {scanResult && (
                                    <div className="bg-white rounded-[2rem] border overflow-hidden text-left shadow-2xl animate-in">
                                        <div className="p-5 bg-green-50 font-black text-green-800 flex justify-between items-center px-8 border-b border-green-100">
                                            <span>{scanResult.length} Articles détectés</span>
                                            <button onClick={()=>{setScanResult(null); setPreviewUrl(null);}}><Icon name="X" size={24}/></button>
                                        </div>
                                        <div className="divide-y max-h-72 overflow-y-auto bg-white">
                                            {scanResult.map((it,i)=>(<div key={i} className="p-4 px-8 flex justify-between items-center font-bold text-slate-700"><span>{it.name}</span><span className="bg-slate-50 px-3 py-1 rounded-xl border">{it.price.toFixed(2)}€</span></div>))}
                                        </div>
                                        <div className="p-6 bg-slate-50 flex space-x-3 border-t">
                                            <button onClick={()=>{setScanResult(null); setPreviewUrl(null);}} className="flex-1 bg-white border py-4 rounded-2xl font-bold">Effacer</button>
                                            <button onClick={async ()=>{
                                                const total=scanResult.reduce((s,i)=>s+i.price,0);
                                                const {db,collection,addDoc,serverTimestamp}=window.firebase;
                                                await addDoc(collection(db,'artifacts',appId,'users',user.uid,'receipts'),{date:new Date().toISOString(),total,itemCount:scanResult.length,timestamp:serverTimestamp()});
                                                for(const s of scanResult){
                                                    const ex = products.find(p => p.name.toLowerCase().trim() === s.name.toLowerCase().trim());
                                                    if(ex) handleUpdate(ex.id, {lastPrice: ex.currentPrice, currentPrice: s.price});
                                                    else handleSave({name: s.name, currentPrice: s.price, lastPrice: s.price, isNeeded: false, quantity: 1});
                                                }
                                                setScanResult(null); setPreviewUrl(null); setView('inventory');
                                            }} className="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black shadow-lg">Tout enregistrer</button>
                                        </div>
                                    </div>
                                )}
                            </section>
                        )}

                        {/* Vue Statistiques */}
                        {view === 'stats' && (
                            <section className="space-y-6">
                                <h2 className="text-2xl font-black">Budget Mensuel</h2>
                                <div className="bg-white p-10 rounded-[3rem] border shadow-sm text-center">
                                    <div className="bg-indigo-50 w-20 h-20 rounded-3xl flex items-center justify-center text-indigo-600 mx-auto mb-6"><Icon name="PieChart" size={40}/></div>
                                    <p className="text-slate-400 font-bold uppercase text-xs mb-1 tracking-widest">Dépenses ce mois-ci</p>
                                    <p className="text-6xl font-black text-indigo-600 tracking-tighter">{monthTotal.toFixed(2)} €</p>
                                    <p className="mt-6 text-sm font-bold text-slate-400 bg-slate-100 py-2 px-4 rounded-full inline-block italic">Basé sur {receipts.length} tickets cloud</p>
                                </div>
                            </section>
                        )}

                        {/* Vue Sécurité */}
                        {view === 'settings' && (
                            <section className="space-y-6">
                                <h2 className="text-2xl font-black">Données Cloud</h2>
                                <div className="bg-white p-8 rounded-[2.5rem] border flex items-center space-x-5 shadow-sm">
                                    <div className="bg-green-100 p-5 rounded-[1.5rem] text-green-600 shadow-inner"><Icon name="Cloud" size={32}/></div>
                                    <div>
                                        <p className="font-black text-lg">Cloud Personnel Actif</p>
                                        <p className="text-xs text-slate-500 font-medium">Tes données sont sauvegardées en temps réel sur Firebase.</p>
                                        <p className="text-[10px] text-slate-300 mt-1 uppercase font-black">ID: {user?.uid}</p>
                                    </div>
                                </div>
                                <button onClick={()=>{const data={products,receipts}; const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="panier-malin.json"; a.click();}} className="w-full bg-white border border-slate-200 py-5 rounded-3xl font-black flex items-center justify-center space-x-3 text-slate-600 shadow-sm active:scale-95 transition-all"><Icon name="Download" size={20}/><span>Exporter une sauvegarde</span></button>
                            </section>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
