        if (loading) return (
            <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
                <div style={{ width: 32, height: 32, border: '2px solid var(--border)', borderTopColor: 'var(--accent)', borderRadius: '50%', animation: 'spin 0.7s linear infinite' }}></div>
                <span style={{ color: 'var(--muted)', fontSize: 13, fontWeight: 500 }}>Chargement…</span>
            </div>
        );



        return (
            <div style={{ paddingBottom: 76, minHeight: '100vh' }}>

                {/* ── ACCUEIL ── */}
                {view === 'accueil' && (
                    <div style={{ padding: '20px 16px', display: 'flex', flexDirection: 'column', gap: 14 }}>
                        <div className="dashboard-hero fade-up">
                            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', opacity: 0.75, marginBottom: 6 }}>
                                {now.toLocaleString('fr-FR', { month: 'long', year: 'numeric' })}
                            </div>
                            <div className="hero-amount">{fmt(monthTotal)} €</div>
                            <div style={{ marginTop: 14, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                                <span className="stat-pill"><Icon name="receipt" size={12} color="white"/> {monthReceipts} ticket{monthReceipts > 1 ? 's' : ''}</span>
                                {monthDelta !== null && (
                                    <span className="stat-pill">
                                        <Icon name={parseFloat(monthDelta) >= 0 ? 'trend_up' : 'trend_down'} size={12} color="white"/>
                                        {parseFloat(monthDelta) >= 0 ? '+' : ''}{monthDelta}% vs mois dernier
                                    </span>
                                )}
                            </div>
                        </div>

                        <div className="fade-up-1" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                            <button className="quick-action" onClick={() => setView('scanner')}>
                                <div className="qa-icon" style={{ background: '#eef1fe' }}><Icon name="camera" size={22} color="var(--accent)"/></div>
                                <div>
                                    <div style={{ fontWeight: 700, fontSize: 14 }}>Scanner</div>
                                    <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 1 }}>Ticket de caisse</div>
                                </div>
                            </button>
                            <button className="quick-action" onClick={() => setView('liste')}>
                                <div className="qa-icon" style={{ background: '#edfaf4' }}><Icon name="list" size={22} color="var(--down)"/></div>
                                <div>
                                    <div style={{ fontWeight: 700, fontSize: 14 }}>Ma liste</div>
                                    <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 1 }}>{shoppingList.length > 0 ? `${shoppingList.length} articles` : 'Vide'}</div>
                                </div>
                            </button>
                        </div>

                        {priceChangedProducts.length > 0 && (
                            <div className="fade-up-2">
                                <div className="section-title">Variations récentes</div>
                                <div className="card" style={{ overflow: 'hidden' }}>
                                    {priceChangedProducts.slice(0, 5).map(p => {
                                        const delta = priceDelta(p.currentPrice, p.lastPrice);
                                        const isUp = parseFloat(delta) > 0;
                                        return (
                                            <div className="receipt-row" key={p.id}>
                                                <span style={{ fontSize: 14, fontWeight: 500, flex: 1 }}>{p.name}</span>
                                                <span style={{ fontFamily: 'DM Mono', fontSize: 12, color: 'var(--muted)', marginRight: 8 }}>{fmt(p.currentPrice)} €</span>
                                                <span className={`var-badge ${isUp ? 'var-up' : 'var-down'}`}>{isUp ? '+' : ''}{delta}%</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {receipts.length > 0 && (
                            <div className="fade-up-3">
                                <div className="section-title">Derniers tickets</div>
                                <div className="card" style={{ overflow: 'hidden' }}>
                                    {[...receipts].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 4).map(r => (
                                        <div className="receipt-row" key={r.id}>
                                            <div>
                                                <div style={{ fontWeight: 600, fontSize: 14 }}>{new Date(r.date).toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' })}</div>
                                                <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 1 }}>{r.itemCount} articles</div>
                                            </div>
                                            <span style={{ fontFamily: 'DM Mono', fontSize: 14, fontWeight: 500, color: 'var(--text-2)' }}>{fmt(r.total)} €</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                )}

                {/* ── CATALOGUE ── */}
                {view === 'catalogue' && (
                    <div className="fade-up" style={{ padding: '20px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <span className="page-title">Catalogue</span>
                            <span className="chip">{products.length} produits</span>
                        </div>
                        <div className="card" style={{ padding: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
                            <input className="inp" placeholder="Nom du produit" value={newItem.name}
                                onChange={e => setNewItem({ ...newItem, name: e.target.value })}
                                onKeyDown={e => { if (e.key === 'Enter' && newItem.name && newItem.price) { saveProd({ name: newItem.name, currentPrice: parseFloat(newItem.price), lastPrice: parseFloat(newItem.price), isNeeded: false, quantity: 1, priceHistory: [] }); setNewItem({ name: '', price: '' }); } }}
                            />
                            <div style={{ display: 'flex', gap: 8 }}>
                                <input className="inp" type="number" step="0.01" placeholder="Prix €" value={newItem.price} onChange={e => setNewItem({ ...newItem, price: e.target.value })} style={{ flex: 1 }}/>
                                <button className="btn-primary" onClick={() => { if (!newItem.name || !newItem.price) return; saveProd({ name: newItem.name, currentPrice: parseFloat(newItem.price), lastPrice: parseFloat(newItem.price), isNeeded: false, quantity: 1, priceHistory: [] }); setNewItem({ name: '', price: '' }); }}>Ajouter</button>
                            </div>
                        </div>
                        {products.length > 4 && <input className="inp" placeholder="Rechercher…" value={search} onChange={e => setSearch(e.target.value)} />}
                        <div className="card" style={{ overflow: 'hidden' }}>
                            {filteredProducts.length === 0 && <div className="empty"><div className="empty-icon"><Icon name="tag" size={24} color="var(--border)"/></div>Aucun produit</div>}
                            {filteredProducts.map(p => {
                                const delta = priceDelta(p.currentPrice, p.lastPrice);
                                const isUp = delta && parseFloat(delta) > 0;
                                return (
                                    <div className="product-row" key={p.id}>
                                        <button className={`check-btn ${p.isNeeded ? 'checked' : ''}`} onClick={() => updateProd(p.id, { isNeeded: !p.isNeeded })}>
                                            {p.isNeeded && <Icon name="check" size={13} color="white"/>}
                                        </button>
                                        <span style={{ flex: 1, fontSize: 14, fontWeight: 500, color: p.isNeeded ? 'var(--text)' : 'var(--text-2)' }}>{p.name}</span>
                                        {delta && <span className={`var-badge ${isUp ? 'var-up' : 'var-down'}`}>{isUp ? '+' : ''}{delta}%</span>}
                                        <input type="number" step="0.01" className="price-inp"
                                            defaultValue={p.currentPrice?.toFixed(2)}
                                            key={p.id + '-' + p.currentPrice}
                                            onBlur={e => { const val = parseFloat(e.target.value); if (!isNaN(val) && val !== p.currentPrice) updateProd(p.id, { lastPrice: p.currentPrice, currentPrice: val, priceHistory: [...(p.priceHistory || []), { price: p.currentPrice, date: new Date().toISOString() }] }); }}
                                        />
                                        <button className="del-btn" onClick={() => { if (confirm('Supprimer ?')) deleteProd(p.id); }}><Icon name="trash" size={15}/></button>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                )}

                {/* ── LISTE ── */}
                {view === 'liste' && (
                    <div className="fade-up" style={{ padding: '20px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <span className="page-title">Ma liste</span>
                            <span style={{ fontFamily: 'DM Mono', fontSize: 13, color: 'var(--muted)' }}>{shoppingList.length} articles</span>
                        </div>
                        <div className="card" style={{ padding: '16px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <div>
                                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 4 }}>Estimation</div>
                                <div style={{ fontFamily: 'DM Mono', fontSize: 28, fontWeight: 500, color: 'var(--accent)', letterSpacing: '-0.02em' }}>{fmt(shoppingTotal)} €</div>
                            </div>
                            {shoppingList.length > 0 && (
                                <button className="btn-primary" style={{ fontSize: 13, padding: '10px 16px' }} onClick={async () => {
                                    await addReceipt({ date: new Date().toISOString(), total: shoppingTotal, itemCount: shoppingList.length });
                                    for (const item of shoppingList) updateProd(item.id, { isNeeded: false, quantity: 1 });
                                    setView('accueil');
                                }}>Terminer</button>
                            )}
                        </div>
                        <div className="card" style={{ overflow: 'hidden' }}>
                            {shoppingList.length === 0 && <div className="empty"><div className="empty-icon"><Icon name="list" size={24} color="var(--border)"/></div>Coche des produits dans le catalogue</div>}
                            {shoppingList.map(item => (
                                <div className="product-row" key={item.id}>
                                    <div className="qty-ctrl">
                                        <button className="qty-btn" onClick={() => updateProd(item.id, { quantity: Math.max(1, (item.quantity || 1) - 1) })}><Icon name="minus" size={13}/></button>
                                        <span className="qty-val">{item.quantity || 1}</span>
                                        <button className="qty-btn" onClick={() => updateProd(item.id, { quantity: (item.quantity || 1) + 1 })}><Icon name="plus" size={13}/></button>
                                    </div>
                                    <span style={{ flex: 1, fontSize: 14, fontWeight: 500, paddingLeft: 8 }}>{item.name}</span>
                                    <span style={{ fontFamily: 'DM Mono', fontSize: 14, color: 'var(--accent)', fontWeight: 500 }}>{fmt(item.currentPrice * (item.quantity || 1))} €</span>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* ── SCANNER ── */}
                {view === 'scanner' && (
                    <div className="fade-up" style={{ padding: '20px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <span className="page-title">Scanner</span>
                            <span className="chip" style={{ fontFamily: 'DM Mono', fontSize: 10 }}>Gemini 2.5</span>
                        </div>
                        {previewUrl && (
                            <div className="scan-preview">
                                <img src={previewUrl} alt="ticket"/>
                                {isScanning && <div className="scan-overlay"><div className="loader"></div><span style={{ color: 'white', fontSize: 12, fontWeight: 600 }}>Analyse en cours…</span></div>}
                            </div>
                        )}
                        {!scanResult && !isScanning && (
                            <label className="scan-zone">
                                <div className="scan-icon"><Icon name="camera" size={28} color="var(--accent)"/></div>
                                <div style={{ textAlign: 'center' }}>
                                    <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 3 }}>{previewUrl ? 'Changer de ticket' : 'Choisir un ticket'}</div>
                                    <div style={{ fontSize: 13, color: 'var(--muted)' }}>Photo ou galerie</div>
                                </div>
                                <input ref={fileRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={handleFileSelect}/>
                            </label>
                        )}
                        {scanResult && !isScanning && (
                            <div className="card fade-up" style={{ overflow: 'hidden' }}>
                                <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border-light)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                        <Icon name="ok" size={16} color="var(--down)"/>
                                        <span style={{ fontWeight: 700, fontSize: 14 }}>{scanResult.length} articles détectés</span>
                                    </div>
                                    <button className="del-btn" onClick={() => { setScanResult(null); setPreviewUrl(null); }}><Icon name="x" size={16}/></button>
                                </div>
                                <div style={{ maxHeight: 300, overflowY: 'auto' }}>
                                    {scanResult.map((it, i) => (
                                        <div className="scan-item" key={i}>
                                            <span style={{ fontSize: 13, color: 'var(--text-2)', flex: 1, paddingRight: 12 }}>{it.name}</span>
                                            <span style={{ fontFamily: 'DM Mono', fontSize: 13, color: 'var(--accent)', fontWeight: 500 }}>{fmt(it.price)} €</span>
                                        </div>
                                    ))}
                                </div>
                                <div style={{ padding: 14, display: 'flex', gap: 8, borderTop: '1px solid var(--border-light)' }}>
                                    <button className="btn-secondary" style={{ flex: 1 }} onClick={() => { setScanResult(null); setPreviewUrl(null); }}>Annuler</button>
                                    <button className="btn-primary" style={{ flex: 2 }} onClick={importScan}>Importer dans le catalogue</button>
                                </div>
                            </div>
                        )}
                    </div>
                )}

                {/* ── BUDGET ── */}
                {view === 'budget' && (
                    <div className="fade-up" style={{ padding: '20px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
                        <span className="page-title">Budget</span>
                        <div className="dashboard-hero">
                            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', opacity: 0.75, marginBottom: 6 }}>
                                {now.toLocaleString('fr-FR', { month: 'long', year: 'numeric' })}
                            </div>
                            <div className="hero-amount">{fmt(monthTotal)} €</div>
                            <div style={{ marginTop: 14, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                                <span className="stat-pill"><Icon name="receipt" size={12} color="white"/> {monthReceipts} ticket{monthReceipts > 1 ? 's' : ''}</span>
                                {monthDelta !== null && (
                                    <span className="stat-pill">
                                        <Icon name={parseFloat(monthDelta) >= 0 ? 'trend_up' : 'trend_down'} size={12} color="white"/>
                                        {parseFloat(monthDelta) >= 0 ? '+' : ''}{monthDelta}% vs mois dernier
                                    </span>
                                )}
                            </div>
                        </div>
                        {receipts.length > 0 && (
                            <>
                                <div className="section-title" style={{ marginBottom: 0 }}>Historique</div>
                                <div className="card" style={{ overflow: 'hidden' }}>
                                    {[...receipts].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 15).map(r => (
                                        <div className="receipt-row" key={r.id}>
                                            <div>
                                                <div style={{ fontWeight: 600, fontSize: 14 }}>{new Date(r.date).toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' })}</div>
                                                <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 1 }}>{r.itemCount} articles</div>
                                            </div>
                                            <span style={{ fontFamily: 'DM Mono', fontSize: 14, fontWeight: 500, color: 'var(--text-2)' }}>{fmt(r.total)} €</span>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}
                        {receipts.length === 0 && <div className="card"><div className="empty"><div className="empty-icon"><Icon name="chart" size={24} color="var(--border)"/></div>Aucun ticket enregistré</div></div>}
                    </div>
                )}

                {/* ── NAV ── */}
                <nav className="nav-bar">
                    {[
                        { id: 'accueil',   icon: 'home',   label: 'Accueil' },
                        { id: 'catalogue', icon: 'grid',   label: 'Catalogue' },
                        { id: 'liste',     icon: 'list',   label: 'Liste', badge: shoppingList.length },
                        { id: 'scanner',   icon: 'camera', label: 'Scanner' },
                        { id: 'budget',    icon: 'chart',  label: 'Budget' },
                    ].map(tab => (
                        <button key={tab.id} className={`nav-btn ${view === tab.id ? 'active' : ''}`} onClick={() => setView(tab.id)}>
                            {tab.badge > 0 && <span className="nav-badge">{tab.badge}</span>}
                            <Icon name={tab.icon} size={21} color={view === tab.id ? 'var(--accent)' : 'var(--muted)'}/>
                            {tab.label}
                        </button>
                    ))}
                </nav>
            </div>
        );
    };

    class ErrorBoundary extends React.Component {
        constructor(props) { super(props); this.state = { error: null }; }
        componentDidCatch(error) { this.setState({ error: error.toString() }); }
        render() {
            if (this.state.error) return (
                <div style={{ padding: 24, fontFamily: 'monospace', fontSize: 13, background: '#fff0f0', color: '#c00', margin: 16, borderRadius: 12, border: '1px solid #fcc' }}>
                    <strong>Erreur :</strong><br/><br/>
                    {this.state.error}
                </div>
            );
            return this.props.children;
        }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
        <ErrorBoundary><App /></ErrorBoundary>
    );
</script>
